backend:
  # Use netlify identity as backend
  name: git-gateway
  branch: main
  ### enable below lines for github integration ###
  # name: github
  # repo: surjithctly/neat-starter
media_folder: "src/static/img"
public_folder: "/static/img"

# Please run "npx netlify-cms-proxy-server" for local backend
local_backend: true
# publish_mode: editorial_workflow
collections:
  - label: "Films"
    name: "films"
    folder: "src/work"
    create: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Ondertitel (nodig?)", name: "description", widget: "string" }
      - label: "Gallery"
        label_singular: "foto"
        name: "galleryImages"
        widget: "list"
        summary: "{{fields.image}}"
        fields:
          - { label: Image, name: image, widget: image }
          - {
              label: "Onzichtbare ondertitel afbeelding voor slechtzienden",
              name: "alt",
              widget: "string",
            }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "films" }
  - label: "Settings"
    name: "settings"
    editor:
      preview: false
    files:
      - label: "Homepage"
        name: "Homepage"
        file: "src/index.html"
        fields:
          - { label: Layout, name: layout, widget: hidden, default: "default" }
          - { label: Title, name: title, widget: string }
          - { label: Path, name: path, widget: hidden, default: "home" }
          - label: "Gallery"
            label_singular: "foto"
            name: "galleryImages"
            widget: "list"
            summary: "{{fields.image}}"
            fields:
              - { label: Image, name: image, widget: image }
              - {
                  label: "Onzichtbare ondertitel afbeelding voor slechtzienden",
                  name: "alt",
                  widget: "string",
                }
          - { label: Body, name: body, widget: hidden }
      - label: "Bio"
        name: "bio"
        file: "src/bio.md"
        fields:
          - { label: layout, name: layout, widget: hidden, default: "default" }
          - { label: Body, name: body, widget: markdown }
      - label: "Navigation"
        name: "items"
        file: "src/_data/navigation.yaml"
        fields:
          - label: Nav Items
            name: items
            widget: list
            allow_add: false
            collapsed: false
            fields:
              - { label: Title, name: text, widget: string }
              - { label: URL, name: url, widget: string }
      - label: "Meta Settings"
        name: "settings"
        file: "src/_data/settings.yaml"
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Background Color, name: bgcolor, widget: color }
          - { label: Font Color, name: fontcolor, widget: color }
          - { label: Author, name: author, widget: string }
          - { label: Website author URL, name: url, widget: string }
