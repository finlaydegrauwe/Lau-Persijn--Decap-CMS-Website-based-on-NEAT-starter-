---
layout: default
---

<section class="flex flex-col w-full lg:max-w-3xl gap-16 m-auto">
    {% set postslist = collections.films %}

    {% for post in postslist %}

        <div class="grid grid-cols-1 gap-8 items-center w-full">
            
            {# Image Block #}
                    <a href="{{ post.url | url }}">
            <img src="{{ post.data.galleryImages[0].image }}" 
                 alt="{{ post.data.title }}" 
                 class="w-full object-cover rounded-sm {% if isEven %} lg:order-2 {% else %} lg:order-1 {% endif %}">
                    </a>

            {# Text Block #}
            <article id="{{ post.data.title | slug }}" 
                     class="flex flex-col {% if isEven %} lg:order-1 {% else %} lg:order-2 {% endif %}">
                
                <h2 class="font-bold text-2xl mb-2">
                    <a href="{{ post.url | url }}">
                        {{ post.data.title if post.data.title else "Untitled" }}
                    </a>
                </h2>
            </article>
        </div>
    {% endfor %}
</section>
